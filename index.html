<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>알파벳 대소문자 매칭 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f8ff;
            --primary: #4a90e2;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text-dark: #333;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Jua', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden; /* 스크롤 방지 */
            user-select: none; /* 텍스트 선택 방지 */
            -webkit-user-select: none;
        }
        #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* 공통 UI 요소 */
        .btn {
            font-family: 'Jua', sans-serif;
            border: none; border-radius: 2vh;
            cursor: pointer; font-size: 3vmin;
            touch-action: manipulation; /* 전자칠판 터치 최적화 */
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d {
            background-color: white;
            box-shadow: 0 1vh 0 #ccc;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-3d:active {
            transform: translateY(1vh);
            box-shadow: 0 0 0 #ccc;
        }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 1vh 0 #357abd; padding: 2vh 4vw; font-size: 4vmin; }
        .btn-primary:active { transform: translateY(1vh); box-shadow: 0 0 0 #357abd; }

        /* 화면 레이아웃 */
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid-container {
            display: grid; width: 100%; height: 100%; gap: 1vw; padding: 1vw; box-sizing: border-box;
        }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        /* 플레이어 영역 */
        .player-zone {
            background: white; border-radius: 3vh; padding: 2vh;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.1);
        }
        .header-info { width: 100%; display: flex; justify-content: space-between; font-size: 3.5vmin; color: var(--primary); }
        .target-letter { font-size: 18vmin; font-weight: bold; margin: 2vh 0; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2vh; width: 100%; height: 40%; }
        .option-btn { font-size: 10vmin; border-radius: 3vh; }
        
        /* 색상 상태 */
        .correct { background-color: var(--correct) !important; color: white !important; box-shadow: 0 1vh 0 #27ae60 !important; }
        .wrong { background-color: var(--wrong) !important; color: white !important; box-shadow: 0 1vh 0 #c0392b !important; }
        
        /* 결과 화면 */
        .result-cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 2vw; padding: 2vh; overflow-y: auto; height: 80%; }
        .result-card { background: white; padding: 2vh 3vw; border-radius: 2vh; width: 40vw; box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.1); }
        .wrong-note { margin-top: 1.5vh; font-size: 2.5vmin; background: #fff5f5; padding: 1.5vh; border-radius: 1vh; text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 알파벳 데이터 (A-Z)
        const alphabets = Array.from({length: 26}, (_, i) => ({
            upper: String.fromCharCode(65 + i),
            lower: String.fromCharCode(97 + i)
        }));

        // 효과음 생성기
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime); // 높은 음
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(220, ctx.currentTime); // 낮은 음
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch(e) { console.log("Audio not supported"); }
        };

        // 개별 플레이어 영역 컴포넌트
        const PlayerZone = ({ playerNum, level, duration, onGameOver }) => {
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(duration);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [question, setQuestion] = useState(null);
            const [status, setStatus] = useState('playing'); // playing, correct, wrong
            const [selectedId, setSelectedId] = useState(null);
            
            // 문제 출제 로직
            const generateQuestion = () => {
                const maxIndex = Math.min(26, level * 5 + 1); // 난이도별 범위
                const targetPair = alphabets[Math.floor(Math.random() * maxIndex)];
                const isUpperToLower = Math.random() > 0.5; // 50:50 비율
                
                const qText = isUpperToLower ? targetPair.upper : targetPair.lower;
                const aText = isUpperToLower ? targetPair.lower : targetPair.upper;
                
                // 오답 보기 3개 생성
                let options = [aText];
                while(options.length < 4) {
                    const randomPair = alphabets[Math.floor(Math.random() * maxIndex)];
                    const wrongText = isUpperToLower ? randomPair.lower : randomPair.upper;
                    if (!options.includes(wrongText)) options.push(wrongText);
                }
                options.sort(() => Math.random() - 0.5); // 섞기
                
                setQuestion({ target: qText, answer: aText, options });
                setStatus('playing');
                setSelectedId(null);
            };

            useEffect(() => { generateQuestion(); }, []);

            // 타이머 로직
            useEffect(() => {
                if (timeLeft <= 0) {
                    onGameOver(playerNum, score, wrongAnswers);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const handleSelect = (option) => {
                if (status !== 'playing') return; // 중복 터치 방지
                
                setSelectedId(option);
                if (option === question.answer) {
                    playSound('correct');
                    setStatus('correct');
                    setScore(prev => prev + 10);
                } else {
                    playSound('wrong');
                    setStatus('wrong');
                    setWrongAnswers(prev => [...prev, { q: question.target, wrong: option, right: question.answer }]);
                }
                setTimeout(generateQuestion, 800); // 0.8초 후 다음 문제
            };

            if (!question) return <div>로딩중...</div>;

            return (
                <div className="player-zone">
                    <div className="header-info">
                        <span>P{playerNum} 점수: {score}</span>
                        <span>⏳ {timeLeft}초</span>
                    </div>
                    <div className="target-letter">{question.target}</div>
                    <div className="options-grid">
                        {question.options.map((opt, idx) => {
                            let btnClass = "btn btn-3d option-btn";
                            if (status !== 'playing') {
                                if (opt === question.answer) btnClass += " correct";
                                else if (opt === selectedId) btnClass += " wrong";
                            }
                            return (
                                <button key={idx} className={btnClass} onClick={() => handleSelect(opt)}>
                                    {opt}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // 메인 앱 컴포넌트
        const App = () => {
            const [gameState, setGameState] = useState('settings'); // settings, countdown, playing, result
            const [playersCount, setPlayersCount] = useState(2);
            const [difficulty, setDifficulty] = useState(3);
            const [timeLimit, setTimeLimit] = useState(60);
            const [countdown, setCountdown] = useState(3);
            const [results, setResults] = useState([]);

            const startGame = () => { setGameState('countdown'); setCountdown(3); };

            useEffect(() => {
                if (gameState === 'countdown') {
                    if (countdown > 0) {
                        const timer = setTimeout(() => setCountdown(c => c - 1), 1000);
                        return () => clearTimeout(timer);
                    } else {
                        setGameState('playing');
                        setResults([]);
                    }
                }
            }, [gameState, countdown]);

            const handleGameOver = (playerNum, score, wrongAnswers) => {
                setResults(prev => {
                    const newResults = [...prev, { playerNum, score, wrongAnswers }];
                    if (newResults.length === playersCount) {
                        setTimeout(() => setGameState('result'), 500); // 모두 종료 시 결과창
                    }
                    return newResults;
                });
            };

            const renderSettings = () => (
                <div className="screen">
                    <h1 style={{fontSize: '8vmin', color: 'var(--primary)', marginBottom: '5vh'}}>알파벳 매칭 게임 🎮</h1>
                    <div style={{display: 'flex', gap: '3vw', marginBottom: '4vh', fontSize: '4vmin'}}>
                        <label>인원: <select value={playersCount} onChange={e => setPlayersCount(Number(e.target.value))} style={{fontSize:'3vmin', padding:'1vh'}}>
                            {[1,2,3,4].map(n => <option key={n} value={n}>{n}인</option>)}
                        </select></label>
                        <label>난이도: <select value={difficulty} onChange={e => setDifficulty(Number(e.target.value))} style={{fontSize:'3vmin', padding:'1vh'}}>
                            {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}단계</option>)}
                        </select></label>
                        <label>시간: <select value={timeLimit} onChange={e => setTimeLimit(Number(e.target.value))} style={{fontSize:'3vmin', padding:'1vh'}}>
                            <option value={30}>30초</option><option value={60}>60초</option><option value={120}>120초</option>
                        </select></label>
                    </div>
                    <button className="btn btn-primary" onClick={startGame}>게임 시작!</button>
                </div>
            );

            const renderCountdown = () => (
                <div className="screen">
                    <h1 style={{fontSize: '30vmin', color: 'var(--primary)', margin: 0}}>
                        {countdown > 0 ? countdown : "GO!"}
                    </h1>
                </div>
            );

            const renderPlaying = () => {
                const gridClass = playersCount === 1 ? 'grid-1' : (playersCount === 2 ? 'grid-2' : 'grid-4');
                return (
                    <div className={`grid-container ${gridClass}`}>
                        {Array.from({length: playersCount}).map((_, i) => (
                            <PlayerZone key={i} playerNum={i+1} level={difficulty} duration={timeLimit} onGameOver={handleGameOver} />
                        ))}
                    </div>
                );
            };

            const renderResults = () => {
                const sortedResults = [...results].sort((a, b) => b.score - a.score);
                return (
                    <div className="screen" style={{justifyContent: 'flex-start', paddingTop: '5vh'}}>
                        <h1 style={{fontSize: '6vmin', color: 'var(--primary)'}}>최종 결과 🎉</h1>
                        <div className="result-cards">
                            {sortedResults.map((res, idx) => (
                                <div key={res.playerNum} className="result-card">
                                    <h2>{idx + 1}등 - Player {res.playerNum} ({res.score}점)</h2>
                                    <div className="wrong-note">
                                        <strong>나의 오답 노트 📝</strong><br/>
                                        {res.wrongAnswers.length === 0 ? 
                                            <span style={{color: 'var(--correct)'}}>전부 맞혔어요! 완벽해요! ✨</span> : 
                                            <ul style={{paddingLeft: '3vw', margin: '1vh 0'}}>
                                                {res.wrongAnswers.map((w, i) => (
                                                    <li key={i}>{w.q} ➔ {w.wrong} (X) / {w.right} (O)</li>
                                                ))}
                                            </ul>
                                        }
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="btn btn-primary" onClick={() => setGameState('settings')} style={{marginTop: '2vh'}}>다시 하기</button>
                    </div>
                );
            };

            return (
                <React.Fragment>
                    {gameState === 'settings' && renderSettings()}
                    {gameState === 'countdown' && renderCountdown()}
                    {gameState === 'playing' && renderPlaying()}
                    {gameState === 'result' && renderResults()}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
